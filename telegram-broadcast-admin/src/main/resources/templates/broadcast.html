<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Рассылка</title>
    <link rel="stylesheet" th:href="@{'/static/css/style.css'}" />
</head>
<body>
<h1>Админ-панель рассылок</h1>

<!-- Изменения здесь: enctype="multipart/form-data" и method="post" -->
<form th:action="@{/admin/send}" method="post" enctype="multipart/form-data">
    <label for="text">Сообщение (для подписи к картинке, если есть)</label><br/>
    <textarea id="text" name="text" rows="4" cols="50" placeholder="Сообщение для отправки"></textarea><br/><br/>

    <!-- Новое поле для загрузки файла -->
    <label for="photo">Изображение</label><br/>
    <input type="file" id="photo" name="photo" accept="image/*"><br/><br/>

    <button type="submit">Отправить</button>
</form>

<p>Тут будет список рассылок или форма для их отправки.</p>
</body>
</html>
